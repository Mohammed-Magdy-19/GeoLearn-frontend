<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="O8jlrWnkCNr3xQaztzH_O4cOGQK4JpVYBQdymR8AX8c" />
    <meta name="description" content="GeoLearn - An interactive, modern platform for learning geography, spatial data science, and GIS mapping." />
    <link rel="canonical" href="https://geo-learn-frontend.vercel.app/" />
    <title>GeoLearn - Interactive Geography & Spatial Data Learning</title>

    <!-- Open Graph defaults (overridden per-page by React Helmet Async) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="GeoLearn" />
    <meta property="og:title" content="GeoLearn - Interactive Geography & Spatial Data Learning" />
    <meta property="og:description" content="GeoLearn - An interactive, modern platform for learning geography, spatial data science, and GIS mapping." />
    <meta property="og:url" content="https://geo-learn-frontend.vercel.app/" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card defaults -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GeoLearn - Interactive Geography & Spatial Data Learning" />
    <meta name="twitter:description" content="GeoLearn - An interactive, modern platform for learning geography, spatial data science, and GIS mapping." />

    <script>
      (function() {
        const storedTheme = localStorage.getItem('theme');
        if (storedTheme === 'dark' || (!storedTheme && true)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
